# dofi.conf - 本地运行配置 (请勿提交到 Git)

# 工作目录 (根据你的实际情况修改)
WORKSPACE_DIR="$HOME/dofi"

# 文件名定义
MAC_SERVER_SCRIPT="./host/server.py"
FLINK_MONITOR_SCRIPT="./host/monitor_flink.py"
DOCKER_CONTAINER="dofi"
DOCKER_BOT_SCRIPT="/app/workspace/agent/src/bot.py"

# 日志与PID路径
LOG_FILE="$WORKSPACE_DIR/dofi.log"
PID_FILE="$WORKSPACE_DIR/dofi.pid"
FLINK_MONITOR_LOG_FILE="$WORKSPACE_DIR/flink_monitor.log"
FLINK_MONITOR_PID_FILE="$WORKSPACE_DIR/flink_monitor.pid"